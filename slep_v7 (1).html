<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SLEP Valdivia · Directorio 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f6f9;--s:#fff;--s2:#f0f3f7;--s3:#e4e9f0;
  --bd:#e2e8f0;--bd2:#c8d3df;
  --t:#1e293b;--t2:#475569;--t3:#94a3b8;
  --acc:#2563eb;--al:#eff6ff;--ab:#bfdbfe;
  --grn:#16a34a;--gl:#f0fdf4;--gb:#bbf7d0;
  --amb:#d97706;--aml:#fffbeb;--ambb:#fde68a;
  --red:#dc2626;--rl:#fef2f2;--rb:#fecaca;
  --pur:#7c3aed;--pl:#f5f3ff;--pb:#ddd6fe;
  --tel:#0d9488;--tl:#f0fdfa;--tb:#99f6e4;
  --org:#ea580c;--ol:#fff7ed;--ob:#fed7aa;
  --r:10px;--sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t);font-size:13px}
a{color:var(--acc);text-decoration:none}a:hover{text-decoration:underline}
button{font-family:'Inter',sans-serif;cursor:pointer}
mark{background:#fef9c3;border-radius:2px;padding:0 1px}

.hdr{background:var(--s);border-bottom:1px solid var(--bd);padding:0 20px;height:52px;
  display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
.lmk{width:30px;height:30px;background:var(--acc);border-radius:7px;display:flex;align-items:center;
  justify-content:center;color:#fff;font-weight:800;font-size:11px;flex-shrink:0}
.ltx{font-size:14px;font-weight:700}.lsu{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.hsep{width:1px;height:24px;background:var(--bd)}
.hkpi{display:flex;gap:16px}
.hk{display:flex;align-items:baseline;gap:4px}
.hkn{font-size:15px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1}
.hkl{font-size:10px;color:var(--t3)}
.hr{margin-left:auto;display:flex;align-items:center;gap:8px}
.hbdg{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid;font-family:'JetBrains Mono',monospace;background:var(--al);color:var(--acc);border-color:var(--ab)}
.gdbt{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:7px;border:1px solid var(--bd);background:var(--s2);color:var(--t2);font-size:11px;font-weight:600;transition:all .15s}
.gdbt:hover{border-color:var(--acc);color:var(--acc);text-decoration:none}

.layout{display:grid;grid-template-columns:285px 1fr;height:calc(100vh - 52px)}

/* SIDEBAR */
.sb{background:var(--s);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.sa{padding:12px;border-bottom:1px solid var(--bd)}
.sw{position:relative}
.si2{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px;pointer-events:none}
input[type=text]{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:8px;
  padding:8px 30px 8px 32px;color:var(--t);font-family:'Inter',sans-serif;font-size:12.5px;outline:none;transition:border-color .15s}
input[type=text]:focus{border-color:var(--acc)}
input[type=text]::placeholder{color:var(--t3)}
.clrb{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t3);font-size:16px;display:none;padding:2px}
.clrb:hover{color:var(--t)}
.flt{padding:10px 12px;border-bottom:1px solid var(--bd);display:flex;flex-direction:column;gap:7px}
.fl{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
.cr{display:flex;flex-wrap:wrap;gap:4px}
.chip{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--bd);background:transparent;color:var(--t2);transition:all .12s}
.chip:hover{border-color:var(--t2);color:var(--t)}
.chip.c-ad{border-color:var(--acc);color:var(--acc);background:var(--al)}
.chip.c-ar{border-color:var(--tel);color:var(--tel);background:var(--tl)}
.chip.c-mi{border-color:var(--pur);color:var(--pur);background:var(--pl)}
.chip.c-cm{border-color:var(--amb);color:var(--amb);background:var(--aml)}
.chip.c-tp2{border-color:var(--org);color:var(--org);background:var(--ol)}
.tabs{display:flex;border-bottom:1px solid var(--bd);padding:0 10px}
.tbb{padding:8px 10px;font-size:11px;font-weight:600;background:none;border:none;color:var(--t3);
  border-bottom:2px solid transparent;transition:all .12s;text-transform:uppercase;letter-spacing:.4px}
.tbb.active{color:var(--acc);border-bottom-color:var(--acc)}
.tbb:hover:not(.active){color:var(--t2)}
.stb{padding:7px 12px;border-bottom:1px solid var(--bd);display:flex;gap:12px;background:var(--s2)}
.sti{display:flex;align-items:baseline;gap:4px}
.stn{font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace}
.stl2{font-size:10px;color:var(--t3)}
.sdv{width:1px;background:var(--bd2)}
.lw{flex:1;overflow-y:auto;padding:5px}
.lw::-webkit-scrollbar{width:4px}.lw::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.eit{padding:9px 10px;border-radius:8px;border:1px solid transparent;margin-bottom:1px;transition:background .1s;cursor:pointer}
.eit:hover{background:var(--s2)}.eit.sel{background:var(--al);border-color:var(--ab)}
.eit.pinned{background:rgba(37,99,235,.03);border-color:rgba(37,99,235,.15)}
.enm{font-size:12px;font-weight:600;line-height:1.3;color:var(--t);margin-bottom:4px}
.emet{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.tg{font-size:9px;font-family:'JetBrains Mono',monospace;font-weight:500;padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.4px}
.tg-ad{background:var(--al);color:var(--acc)}.tg-ar{background:var(--tl);color:var(--tel)}
.tg-mi{background:var(--pl);color:var(--pur)}.tg-no{background:var(--s2);color:var(--t3)}
.tg-rb{background:var(--aml);color:var(--amb)}.tg-dt{background:var(--gl);color:var(--grn)}
.tg-tp{background:var(--ol);color:var(--org)}
.tcm{font-size:10px;color:var(--t3)}.pico{margin-left:auto;font-size:10px}
.nr{text-align:center;padding:36px 16px;color:var(--t3);font-size:12px}

/* DETAIL */
.det{overflow-y:auto;background:var(--bg)}
.det::-webkit-scrollbar{width:4px}.det::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.din{padding:22px 26px;max-width:980px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--t3);text-align:center;gap:10px}
.empty .eico{font-size:48px;opacity:.28}.empty p{font-size:14px;line-height:1.55;max-width:260px}

/* Director card */
.dcard{background:linear-gradient(135deg,var(--al),#f0f9ff);border:1px solid var(--ab);border-radius:9px;
  padding:14px 16px;margin-bottom:14px;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:14px}
.dav{width:44px;height:44px;border-radius:50%;background:var(--acc);display:flex;align-items:center;
  justify-content:center;color:#fff;font-weight:700;font-size:16px;flex-shrink:0}
.drl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--acc);margin-bottom:3px}
.dnm{font-size:14px;font-weight:700;color:var(--t);line-height:1.2}
.dsb{font-size:11.5px;color:var(--t2);margin-top:3px}
.dphs{display:flex;flex-direction:column;gap:5px;align-items:flex-end}
.dph{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:7px;
  background:var(--s);border:1px solid var(--ab);font-size:12px;font-weight:600;
  font-family:'JetBrains Mono',monospace;color:var(--acc);white-space:nowrap;text-decoration:none}
.dph:hover{background:var(--al);text-decoration:none}
.dphl{font-size:9px;color:var(--t3);font-family:'Inter',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.noph{font-size:11px;color:var(--t3);font-style:italic}

/* Header card */
.dhc{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:14px;box-shadow:var(--sh)}
.dht{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.dhi{width:46px;height:46px;flex-shrink:0;background:var(--al);border:1px solid var(--ab);
  border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px}
.dhtx{font-size:16px;font-weight:700;line-height:1.25;color:var(--t)}
.dhsu{font-size:11.5px;color:var(--t2);margin-top:4px;line-height:1.5}
.dtgs{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.dtg{padding:3px 9px;border-radius:5px;font-size:10.5px;font-weight:600;border:1px solid}
.dtg-ad{background:var(--al);color:var(--acc);border-color:var(--ab)}
.dtg-ar{background:var(--tl);color:var(--tel);border-color:var(--tb)}
.dtg-mi{background:var(--pl);color:var(--pur);border-color:var(--pb)}
.dtg-rb{background:var(--aml);color:var(--amb);border-color:var(--ambb)}
.dtg-cm{background:var(--s2);color:var(--t2);border-color:var(--bd)}
.dtg-ru{background:var(--gl);color:var(--grn);border-color:var(--gb)}
.dtg-pi{background:var(--pl);color:var(--pur);border-color:var(--pb)}
.dtg-se{background:var(--tl);color:var(--tel);border-color:var(--tb)}
.dtg-tp{background:var(--ol);color:var(--org);border-color:var(--ob)}
.dtg-ca{background:var(--gl);color:var(--grn);border-color:var(--gb)}
.dtg-cm2{background:var(--aml);color:var(--amb);border-color:var(--ambb)}
.dtg-ci{background:var(--rl);color:var(--red);border-color:var(--rb)}
.dtg-cx{background:var(--s2);color:var(--t3);border-color:var(--bd)}
.ar{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}
.abtn{padding:6px 13px;border-radius:7px;font-size:12px;font-weight:600;border:1px solid var(--bd);
  background:var(--s2);color:var(--t2);transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.abtn:hover{border-color:var(--acc);color:var(--acc);text-decoration:none}
.abtn.pinned{background:var(--acc);color:#fff;border-color:var(--acc)}

/* Info grid */
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.ic{background:var(--s);border:1px solid var(--bd);border-radius:8px;padding:11px 13px}
.ic.full{grid-column:1/-1}
.il{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);margin-bottom:4px}
.iv{font-size:13px;font-weight:600;color:var(--t);word-break:break-word}
.iv.em{color:var(--t3);font-style:italic;font-weight:400}

/* Staff */
.stg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sc{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:10px 12px}
.srl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-bottom:4px}
.snm{font-size:12px;font-weight:600;color:var(--t);line-height:1.3}
.sct{font-size:11px;color:var(--t2);margin-top:3px;word-break:break-all}

/* Sections */
.sec{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--sh)}
.stl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t2);
  margin-bottom:12px;display:flex;align-items:center;gap:8px}
.stl::after{content:'';flex:1;height:1px;background:var(--bd)}

/* KPI grid */
.kg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.kb{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:12px;text-align:center}
.kv{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1}
.kl{font-size:9px;color:var(--t3);margin-top:4px;text-transform:uppercase;letter-spacing:.4px}

/* Occ bar */
.ow{margin-bottom:14px}
.oh{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.ola{font-size:11px;color:var(--t2);font-weight:600}
.opct{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace}
.otr{height:8px;background:var(--s2);border-radius:4px;overflow:hidden;border:1px solid var(--bd)}
.ofi{height:100%;border-radius:4px;transition:width .4s ease}

/* Nivel table with expandable courses */
.ntbl{width:100%;border-collapse:collapse;font-size:12px}
.ntbl th{padding:6px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;color:var(--t3);border-bottom:2px solid var(--bd);background:var(--s2)}
.ntbl td{padding:7px 10px;border-bottom:1px solid var(--bd)}
.ntbl tbody tr:last-child > td{border-bottom:none}
.nrow{cursor:default;transition:background .1s}
.nrow:hover td{background:var(--s2)}
.nrow.exp{cursor:pointer}
.nrow.exp:hover td{background:#eff6ff}
.nrow.open td{background:#eff6ff;font-weight:600}
.expico{font-size:10px;color:var(--t3);transition:transform .2s;margin-right:6px;display:inline-block}
.nrow.open .expico{transform:rotate(90deg);color:var(--acc)}
.crow{display:none}.crow.open{display:table-row}
.crow td{padding:0!important;border:none}
.cinner{background:#f8faff;border-bottom:2px solid var(--ab);border-top:1px solid #dbeafe}
.ctbl{width:100%;border-collapse:collapse;font-size:11.5px}
.ctbl th{padding:5px 14px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;
  color:var(--acc);background:var(--al);border-bottom:1px solid var(--ab)}
.ctbl td{padding:5px 14px;border-bottom:1px solid rgba(37,99,235,.08)}
.ctbl tbody tr:last-child td{border-bottom:none}
.ctbl tbody tr:hover td{background:rgba(37,99,235,.04)}

/* Pct bars inline */
.pb{display:inline-block;width:40px;height:5px;background:var(--s3);border-radius:3px;overflow:hidden;vertical-align:middle;margin-right:4px}
.pf{height:100%;border-radius:3px;display:block}
.p-ok{color:var(--grn);font-weight:600}.p-md{color:var(--amb);font-weight:600}.p-lo{color:var(--red);font-weight:600}
.v-ok{color:var(--t2)}.v-wn{color:var(--amb);font-weight:600}.v-ov{color:var(--red);font-weight:600}.v-z{color:var(--t3)}

/* Dotación */
.dg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.dc{border-radius:8px;padding:12px;border:1px solid}
.dc-g{background:#eff6ff;border-color:var(--ab)}.dc-p{background:var(--pl);border-color:var(--pb)}.dc-s{background:var(--tl);border-color:var(--tb)}
.dct{font-size:11px;font-weight:700;margin-bottom:8px;color:var(--t)}
.dr{display:flex;justify-content:space-between;align-items:center;padding:2px 0}
.dk{font-size:11px;color:var(--t2)}.dvl{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--t)}
.brow{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.blbl{font-size:11px;color:var(--t2);width:95px;flex-shrink:0;text-align:right}
.btr{flex:1;height:6px;background:var(--s2);border-radius:3px;overflow:hidden}
.bfi{height:100%;border-radius:3px;transition:width .3s ease}
.bvl{font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--t);width:38px;flex-shrink:0}

/* Personal */
.pfg{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.pfb{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--bd);background:transparent;color:var(--t2);transition:all .12s}
.pfb.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.ptbl{width:100%;border-collapse:collapse;font-size:11.5px}
.ptbl th{padding:5px 8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--t3);border-bottom:2px solid var(--bd);background:var(--s2)}
.ptbl td{padding:5px 8px;border-bottom:1px solid var(--bd)}
.ptbl tbody tr:last-child td{border-bottom:none}
.ptbl tbody tr:hover td{background:var(--s2)}
.pj-g{color:var(--acc);font-weight:600;font-size:10px}.pj-p{color:var(--pur);font-weight:600;font-size:10px}.pj-s{color:var(--tel);font-weight:600;font-size:10px}
.ptgl{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--acc);background:none;border:none;padding:6px 0}
.ptgl:hover{text-decoration:underline}
.ptw{display:none;margin-top:10px}.ptw.open{display:block}

/* BBCC */
.bg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.bi{background:var(--ol);border:1px solid var(--ob);border-radius:8px;padding:10px 12px}
.bn{font-size:12px;font-weight:700;color:var(--t);margin-bottom:2px}.bse{font-size:11px;color:var(--t2)}

/* Asistencia dashboard */
.ask{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.akb{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:11px;text-align:center}
.asf{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.atbl{width:100%;border-collapse:collapse;font-size:12px}
.atbl th{padding:6px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);border-bottom:2px solid var(--bd)}
.atbl td{padding:6px 10px;border-bottom:1px solid var(--bd)}
.atbl tbody tr:last-child td{border-bottom:none}
.atbl tbody tr:hover td{background:var(--s2)}
.atbl tbody tr[style*="none"]{display:none}

/* Alerts */
.al{display:flex;gap:8px;align-items:flex-start;padding:10px 12px;border-radius:7px;margin-bottom:8px;font-size:12px;line-height:1.45}
.al-w{background:var(--aml);border:1px solid var(--ambb);color:#92400e}
.al-e{background:var(--rl);border:1px solid var(--rb);color:#991b1b}
.al-i{background:var(--al);border:1px solid var(--ab);color:#1e40af}

/* Detail tabs */
.dtabs{display:flex;gap:0;border-bottom:1px solid var(--bd);margin-bottom:14px;overflow-x:auto}
.dtabs::-webkit-scrollbar{height:0}
.dtb{padding:8px 13px;font-size:12px;font-weight:600;background:none;border:none;
  color:var(--t3);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.dtb.active{color:var(--acc);border-bottom-color:var(--acc)}
.dtb:hover:not(.active){color:var(--t2)}
.dtp{display:none}.dtp.active{display:block}
.nd{font-size:12px;color:var(--t2);font-style:italic;padding:6px 0}

/* ── MOBILE RESPONSIVE ───────────────────────────── */
@media (max-width: 700px) {
  /* Header compacto */
  .hdr{padding:0 12px;gap:8px;height:48px}
  .lsu{display:none}
  .hkpi{display:none}
  .gdbt{display:none}
  .hbdg{font-size:9px;padding:2px 7px}

  /* Layout: sidebar arriba, detalle abajo — stack vertical */
  .layout{
    grid-template-columns:1fr;
    grid-template-rows:auto 1fr;
    height:calc(100vh - 48px);
  }

  /* Sidebar: altura fija, scroll horizontal para chips */
  .sb{
    height:auto;max-height:52vh;
    border-right:none;border-bottom:1px solid var(--bd);
  }
  .flt{padding:8px 10px;gap:5px}
  .fl{font-size:9px}
  .chip{font-size:10px;padding:2px 7px}
  .cr{flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px}
  .cr::-webkit-scrollbar{height:0}

  /* Tabs más compactos */
  .tabs{padding:0 8px}
  .tbb{padding:7px 8px;font-size:10px;letter-spacing:0}

  /* Stats bar */
  .stb{padding:5px 10px;gap:8px}
  .stn{font-size:12px}
  .stl2{font-size:9px}

  /* Lista */
  .lw{padding:4px}
  .eit{padding:8px 9px}
  .enm{font-size:11.5px}

  /* Detalle ocupa el resto */
  .det{height:100%}
  .din{padding:14px 14px 80px}

  /* Director card: stack vertical en móvil */
  .dcard{
    grid-template-columns:auto 1fr;
    grid-template-rows:auto auto;
    gap:10px;padding:12px;
  }
  .dphs{
    grid-column:1/-1;
    flex-direction:row;flex-wrap:wrap;
    align-items:center;gap:8px;
  }

let srchQ='', activeM=null, activeCm=null, activeTp=null;
let curKey=null, curTab='all', curEE=null, persFilt='ALL';
let pins=new Set(JSON.parse(localStorage.getItem('slep26p')||'[]'));

// ── UTILS
const normStr=s=>s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
const eeKey=e=>(e.r||e.n.slice(0,12)).replace(/\s/g,'')+'_'+e.c;

function hiStr(text,q){
  if(!q)return text;
  const nq=normStr(q),nt=normStr(text),i=nt.indexOf(nq);
  if(i<0)return text;
  return text.slice(0,i)+'<mark>'+text.slice(i,i+q.length)+'</mark>'+text.slice(i+q.length);
}
function matchesEE(e,q){
  const nq=normStr(q);
  return normStr(e.n).includes(nq)||normStr(e.d||'').includes(nq)||normStr(e.a||'').includes(nq)||(e.r||'').includes(q)||normStr(e.c).includes(nq)||(UATP[e.r]&&normStr(UATP[e.r].director||'').includes(nq));
}
function eeType(e){const n=e.n.toUpperCase();if(n.includes('J.I')||n.includes('JISC')||n.includes('SALA CUNA')||n.includes('S.C')||n.includes('JARDIN'))return'JARDIN';if(n.startsWith('LICEO')||n.startsWith('INSTITUTO')||n.startsWith('CENTRO'))return'LICEO';return'ESCUELA'}
function isTP(e){return !!(e.r&&BBCC[e.r])}
function eeIcon(e){const n=e.n.toUpperCase();if(n.includes('J.I')||n.includes('JISC')||n.includes('SALA CUNA')||n.includes('S.C'))return'🌱';if(n.includes('DIFERENCIAL'))return'♿';if(n.startsWith('LICEO'))return'🏛️';if(n.startsWith('COLEGIO'))return'🎓';if(n.startsWith('INSTITUTO')||n.startsWith('CENTRO'))return'🏢';return'🏫'}
function mTag(m){if(!m)return'<span class="tg tg-no">—</span>';if(m==='AD')return'<span class="tg tg-ad">AD</span>';if(m==='ARED')return'<span class="tg tg-ar">ARED</span>';if(m==='MICROCENTRO')return'<span class="tg tg-mi">Micro</span>';return'<span class="tg tg-no">'+m+'</span>'}
function catCls(c){if(!c||c==='Sin categoría')return'dtg-cx';if(c==='Alto')return'dtg-ca';if(c==='Insuficiente')return'dtg-ci';return'dtg-cm2'}
function pctCls(p){return p>=85?'p-ok':p>=70?'p-md':'p-lo'}
function pctBar(p){const c=p>=85?'var(--grn)':p>=70?'var(--amb)':'var(--red)';return`<span class="pb"><span class="pf" style="width:${Math.min(p,100)}%;background:${c}"></span></span>`}

// ── INIT
function init(){
  [...new Set(DIR.map(d=>d.c))].sort().forEach(c=>{
    const b=document.createElement('button');b.className='chip';b.dataset.cm=c;b.textContent=c;
    b.onclick=()=>togCm(c);document.getElementById('cmnChips').appendChild(b);
  });
  document.getElementById('searchInp').addEventListener('input',e=>{
    srchQ=e.target.value.trim();
    document.getElementById('clrBtn').style.display=srchQ?'block':'none';
    renderList();renderStats();
  });
  document.getElementById('clrBtn').onclick=()=>{srchQ='';document.getElementById('searchInp').value='';document.getElementById('clrBtn').style.display='none';renderList();renderStats()};
  document.querySelectorAll('[data-m]').forEach(b=>b.onclick=()=>togM(b.dataset.m));
  document.querySelectorAll('[data-tp]').forEach(b=>b.onclick=()=>togTp(b.dataset.tp));
  renderList();renderStats();renderHdr();
}

function togM(m){activeM=activeM===m?null:m;document.querySelectorAll('[data-m]').forEach(b=>{b.className='chip';if(b.dataset.m===activeM)b.classList.add(m==='AD'?'c-ad':m==='ARED'?'c-ar':'c-mi')});renderList();renderStats()}
function togTp(t){activeTp=activeTp===t?null:t;document.querySelectorAll('[data-tp]').forEach(b=>{b.className='chip';if(b.dataset.tp===activeTp)b.classList.add('c-tp2')});renderList();renderStats()}
function togCm(c){activeCm=activeCm===c?null:c;document.querySelectorAll('[data-cm]').forEach(b=>{b.className='chip';if(b.dataset.cm===activeCm)b.classList.add('c-cm')});renderList();renderStats()}

function getFiltered(){return DIR.filter(e=>{
  if(srchQ&&!matchesEE(e,srchQ))return false;
  if(activeM&&e.m!==activeM)return false;
  if(activeCm&&e.c!==activeCm)return false;
  if(activeTp){if(activeTp==='TP'&&!isTP(e))return false;if(activeTp!=='TP'&&eeType(e)!==activeTp)return false}
  return true;
})}

// ── RENDER LIST
function renderList(){
  const w=document.getElementById('listWrap');
  if(curTab==='asist'){renderAsistPanel();return}
  const fl=curTab==='pin'
    ?DIR.filter(e=>pins.has(eeKey(e))).filter(e=>{if(srchQ&&!matchesEE(e,srchQ))return false;if(activeM&&e.m!==activeM)return false;if(activeCm&&e.c!==activeCm)return false;return true})
    :getFiltered();
  document.getElementById('hcnt').textContent=fl.length+' EE';
  if(!fl.length){w.innerHTML=curTab==='pin'?'<div class="nr">⭐<br>Sin favoritos guardados</div>':'<div class="nr">🔍<br>Sin resultados</div>';return}
  w.innerHTML=fl.map(e=>{
    const k=eeKey(e),ip=pins.has(k),is=curKey===k;

// ── PARSE CONTACT
function parseContact(s){
  if(!s||s==='')return null;
  s=s.replace(/[\xa0\t]/g,' ').replace(/\s+/g,' ').trim();
  const pm=s.match(/(?:telefono|celular|fono)?\s*[:\-]?\s*((?:\+56|56)?[\s\-]?(?:9[\d\s\-]{7,}|[\d\s]{6,}))/i);
  const mm=s.match(/[\w\.\-]+@[\w\.\-]+\.\w+/i);
  let name=s.replace(/^(jefe|jefa|encargad[ao]|inspector[a]?|sub\s*director[a]?|utp|general)[^:]*:\s*/i,'').split(/\n|,|–|—|-/)[0].trim().replace(/\s+/g,' ');
  if(name.length>80)name='';
  const phone=pm?pm[1].replace(/[\s\-]/g,'').replace(/^\+?56/,'').trim():'';
  return{name,phone,mail:mm?mm[0]:''};
}

// ── BEST PHONE for director
function bestPhone(rbd,uatp,phdb){
  if(uatp&&uatp.celular&&uatp.celular.trim()){
    const raw=uatp.celular.trim().replace(/\./g,'');
    const num=raw.replace(/^\+?56/,'').replace(/[^\d]/g,'');
    return{num,src:'Celular'};
  }
  if(phdb&&phdb.fono_ee&&phdb.fono_ee.trim()){
    const m=phdb.fono_ee.match(/(?:\+56|56)?\s*([9][\d\s]{7,}|[\d]{6,})/);
    const num=m?m[0].replace(/[^\d]/g,'').replace(/^56/,''):phdb.fono_ee.split('/')[0].replace(/[^\d+\s]/g,'').trim();
    if(num&&num.length>=7)return{num,src:'Teléfono'};
  }
  if(uatp&&uatp.fono&&uatp.fono.trim())return{num:uatp.fono.trim(),src:'Teléfono'};
  return null;
}

      <td style="display:flex;align-items:center;gap:6px"><span class="expico" id="expico-${i}">${hasCourses?'▶':''}</span>${n[0]}</td>

    const courseSection=hasCourses?`<tr id="nv-${i}" style="display:none"><td colspan="${hasAsist?5:4}" style="padding:0;border-bottom:2px solid var(--ab)">
      <table style="width:100%;border-collapse:collapse;background:#f8faff">

        </tr></thead>
        <tbody>${courseRows}</tbody>
      </table>
    </td></tr>`:'';
    
    return nivelRow+courseSection;
  }).join('');
  
  return`<table class="ntbl">
    <thead><tr><th>Nivel</th><th>Matrícula</th><th>Cupos</th><th>Vacantes</th>${hasAsist?'<th>Asist. Mayo</th>':''}</tr></thead>

    const esps=bbcc.especialidades.split('·').map(e=>e.trim()).filter(Boolean);
    const secs=bbcc.sectores.split('·').map(s=>s.trim()).filter(Boolean);
    secTP=`<div style="margin-bottom:10px;font-size:12px;color:var(--t2)"><strong style="color:var(--t)">${bbcc.n_esp}</strong> especialidades · Sectores: <strong style="color:var(--t)">${secs.join(', ')}</strong></div><div class="bg">${esps.map(e=>`<div class="bi"><div class="bn">${e}</div></div>`).join('')}</div>`;
  }else secTP='<p class="nd">Sin especialidades EMTP registradas.</p>';

  // Staff block
  let staffH='';
  if(utpInfo||inspInfo){
    staffH=`<div class="sec"><div class="stl">Equipo directivo</div><div class="stg">`;
    if(utpInfo)staffH+=`<div class="sc"><div class="srl">Jefe/a UTP</div><div class="snm">${utpInfo.name||'—'}</div>${utpInfo.phone?`<div class="sct">📞 <a href="tel:+56${utpInfo.phone}">${utpInfo.phone}</a></div>`:''} ${utpInfo.mail?`<div class="sct">✉ <a href="mailto:${utpInfo.mail}">${utpInfo.mail}</a></div>`:''}</div>`;
    if(inspInfo)staffH+=`<div class="sc"><div class="srl">Inspector/a General</div><div class="snm">${inspInfo.name||'—'}</div>${inspInfo.phone?`<div class="sct">📞 <a href="tel:+56${inspInfo.phone}">${inspInfo.phone}</a></div>`:''} ${inspInfo.mail?`<div class="sct">✉ <a href="mailto:${inspInfo.mail}">${inspInfo.mail}</a></div>`:''}</div>`;
    staffH+=`</div></div>`;
  }

  // Tabs
  const tabDefs=[
    {id:'tpMat',lbl:'📊 Matrícula'},
    {id:'tpDot',lbl:'👥 Dotación'},
    raw&&raw.tiene_dotacion&&raw.p&&raw.p.length?{id:'tpPer',lbl:'👤 Personal'}:null,
    {id:'tpTP',lbl:'🎓 EMTP'},
  ].filter(Boolean);

  panel.innerHTML=`<div class="din">
    <!-- Director card -->
    <div class="dcard">
      <div class="dav">${dirInitials}</div>
      <div>
        <div class="drl">Director/a</div>
        <div class="dnm">${dirName||'<span style="color:var(--t3);font-weight:400;font-style:italic;font-size:13px">Sin registrar</span>'}</div>
        ${dirMail?`<div class="dsb"><a href="mailto:${dirMail}" style="color:var(--acc)">✉ ${dirMail}</a></div>`:''}
        ${dirAddr?`<div class="dsb">📍 ${dirAddr}${ee.c?', '+ee.c:''}</div>`:''}
      </div>
      <div class="dphs">
        ${dirPhone?`<div><div class="dphl">${dirPhone.src}</div><a class="dph" href="tel:+56${dirPhone.num}">📞 ${dirPhone.num}</a></div>`:'<span class="noph">Sin teléfono registrado</span>'}
        ${dirCorrInst&&dirCorrInst.toLowerCase()!==dirMail.toLowerCase()?`<div style="font-size:11px;margin-top:2px"><a href="mailto:${dirCorrInst.split(';')[0].trim()}">✉ Correo inst.</a></div>`:''}
      </div>
    </div>

    <!-- Info header card -->
    <div class="dhc">
      <div class="dht">
        <div class="dhi">${eeIcon(ee)}</div>
        <div>
          <div class="dhtx">${ee.n}</div>
          <div class="dhsu">${ee.r?`RBD ${ee.r} · `:''}${ee.c}${raw&&raw.rural==='Si'?' · Rural':''}</div>
        </div>
      </div>
      <div class="dtgs">
        ${bigMTag(ee.m)}
        ${ee.r?`<span class="dtg dtg-rb">RBD ${ee.r}</span>`:'<span class="dtg dtg-cx">Sin RBD</span>'}
        <span class="dtg dtg-cm">${ee.c}</span>
        ${raw&&raw.rural==='Si'?'<span class="dtg dtg-ru">Rural</span>':''}
        ${raw&&raw.tiene_pie==='Si'?'<span class="dtg dtg-pi">PIE</span>':''}
        ${raw&&raw.tiene_sep==='Si'?'<span class="dtg dtg-se">SEP</span>':''}
        ${bbcc?'<span class="dtg dtg-tp">EMTP</span>':''}
        ${raw?`<span class="dtg ${catCls(raw.categoria)}">${raw.categoria||'Sin cat.'}</span>`:''}
      </div>
      <div class="ar">
        <button class="abtn${ip?' pinned':''}" onclick="togPin('${k}')">${ip?'⭐ Guardado':'☆ Guardar'}</button>
        ${ee.a?`<button class="abtn" onclick="filtByAsesor('${ee.a}')">👤 ${ee.a} (${acnt} EE)</button>`:''}
      </div>
    </div>

    ${staffH}

    <!-- Tabs -->
    <div class="dtabs">${tabDefs.map((t,i)=>`<button class="dtb${i===0?' active':''}" onclick="swDTab('${t.id}','${tabDefs.map(x=>x.id).join(',')}',this)">${t.lbl}</button>`).join('')}</div>

    <div id="tpMat" class="dtp active"><div class="sec"><div class="stl">Matrícula y vacantes 2026</div>${secMat}</div></div>
    <div id="tpDot" class="dtp"><div class="sec"><div class="stl">Dotación PAL</div>${secDot}</div></div>
    ${raw&&raw.tiene_dotacion&&raw.p&&raw.p.length?`<div id="tpPer" class="dtp"><div class="sec"><div class="stl">Personal PAL (${raw.p.length} registros)</div>
      <div class="pfg"><button class="pfb active" onclick="filtPers('ALL',this)">Todos</button><button class="pfb" onclick="filtPers('DOCENTE',this)">Docentes</button><button class="pfb" onclick="filtPers('GEN',this)">General</button><button class="pfb" onclick="filtPers('PIE',this)">PIE</button><button class="pfb" onclick="filtPers('SEP',this)">SEP</button></div>
      <table class="ptbl"><thead><tr><th>Nombre</th><th>Cargo</th><th>Tipo</th><th>Hrs</th><th>Proy.</th></tr></thead><tbody id="persTbody2"></tbody></table>
    </div></div>`:''}
    <div id="tpTP" class="dtp"><div class="sec"><div class="stl">Especialidades EMTP — BBCC 2016</div>${secTP}</div></div>
  </div>`;

  if(raw&&raw.tiene_dotacion&&raw.p)renderPers(raw,'ALL');
}

function togNivel(row,id){
  const crow=document.getElementById(id);
  if(!crow)return;
  const isOpen=crow.style.display!=='none';
  crow.style.display=isOpen?'none':'table-row';
  // Update expand icon
  const ico=row.querySelector('.expico');
  if(ico)ico.style.transform=isOpen?'':'rotate(90deg)';
  row.style.background=isOpen?'':'#eff6ff';
}
function swDTab(pid,allStr,btn){
  allStr.split(',').forEach(id=>{const el=document.getElementById(id);if(el)el.classList.toggle('active',id===pid)});
  btn.closest('.dtabs').querySelectorAll('.dtb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function togPers(btn){
  const w=document.getElementById('persWrap');if(!w)return;
  w.classList.toggle('open');
  const r=curEE&&curEE.r?RAW[curEE.r]:null,l=r&&r.p?r.p.length:0;
  btn.textContent=w.classList.contains('open')?'▲ Ocultar personal':`▼ Ver ${l} registros de personal`;
}

function filtPers(t,btn){
  persFilt=t;
  (btn.closest('.pfg')||document).querySelectorAll('.pfb').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const r=curEE&&curEE.r?RAW[curEE.r]:null;
  if(r)renderPers(r,t);
}

function renderPers(r,f){
  const bds=[document.getElementById('persTbody'),document.getElementById('persTbody2')].filter(Boolean);
  if(!bds.length||!r||!r.p)return;
  let ps=r.p;
  if(f==='DOCENTE')ps=ps.filter(p=>p[1].toUpperCase().includes('DOCENTE'));
  else if(f==='GEN')ps=ps.filter(p=>p[4]==='GEN');
  else if(f==='PIE')ps=ps.filter(p=>p[4]==='PIE');
  else if(f==='SEP')ps=ps.filter(p=>p[4]==='SEP');
  const tl=t=>t==='T'?'Titular':t==='C'?'Contrata':t;
  const rows=ps.map(p=>{const c=p[4]==='PIE'?'pj-p':p[4]==='SEP'?'pj-s':'pj-g';return`<tr><td>${p[0]}</td><td>${p[1]}</td><td>${tl(p[2])}</td><td>${p[3]}</td><td><span class="${c}">${p[4]}</span></td></tr>`}).join('');
  bds.forEach(b=>b.innerHTML=rows);
}

function togPin(k){
  if(pins.has(k))pins.delete(k);else pins.add(k);
  localStorage.setItem('slep26p',JSON.stringify([...pins]));
  updPinBadge();renderList();
  const e=DIR.find(d=>eeKey(d)===k);if(e)renderDetail(e);
}
function updPinBadge(){const b=document.getElementById('pinBadge');b.textContent=pins.size?`(${pins.size})`:''}
function filtByAsesor(a){document.getElementById('searchInp').value=a;srchQ=a;document.getElementById('clrBtn').style.display='block';swTab('all');renderList();renderStats()}
function swTab(t){
  curTab=t;
  document.querySelectorAll('.tbb').forEach((b,i)=>b.classList.toggle('active',i===(t==='all'?0:t==='pin'?1:2)));
  if(t==='asist'){renderAsistPanel()}else{renderList();renderStats()}
}

init();
// Hide detail on mobile at start
if(isMobile()) document.getElementById('detPanel').style.display='none';
</script>
</body>
</html>
